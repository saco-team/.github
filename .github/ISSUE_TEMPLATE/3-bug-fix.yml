name: "Bug Fix"
description: "バグ修正 - 軽量ワークフロー"
labels: []
projects: ["saco-team/1"]
body:
  # ── 再現手順 ──
  - type: textarea
    id: reproduction-steps
    attributes:
      label: "再現手順"
      description: "バグを再現できる手順を番号付きで記述してください"
      placeholder: |
        1. [画面/URL] にアクセス
        2. [操作] を実行
        3. [結果] が表示される
    validations:
      required: true

  # ── 期待される動作 / 実際の動作 ──
  - type: textarea
    id: expected-vs-actual
    attributes:
      label: "期待される動作 / 実際の動作"
      description: "正しくはどう動くべきか、実際にはどうなったかを記述してください"
      placeholder: |
        ### 期待される動作

        ### 実際の動作

    validations:
      required: true

  # ── 発生環境 ──
  - type: dropdown
    id: environment
    attributes:
      label: "発生環境"
      default: 2
      options:
        - "Production"
        - "Staging"
        - "Development"
        - "All"
    validations:
      required: true

  # ── ブラウザ / OS ──
  - type: input
    id: browser-os
    attributes:
      label: "ブラウザ / OS（任意）"
      description: "特定のブラウザや OS でのみ発生する場合に記載してください"
      placeholder: "例: Chrome 130 / Windows 11"
    validations:
      required: false

  # ── 再現頻度 ──
  - type: dropdown
    id: frequency
    attributes:
      label: "再現頻度（任意）"
      default: 0
      options:
        - "Always"
        - "Sometimes"
        - "Rarely"
    validations:
      required: false

  # ── 優先度 ──
  - type: dropdown
    id: priority
    attributes:
      label: "優先度"
      default: 1
      options:
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true

  # ── 受入検証者 ──
  - type: textarea
    id: acceptance-reviewer
    attributes:
      label: "受入検証者（任意）"
      description: "受入検証する人の GitHub ユーザー名を @付きで記載してください"
      placeholder: "@username"
    validations:
      required: false

  # ── 関連リンク ──
  - type: textarea
    id: related-links
    attributes:
      label: "関連リンク（任意）"
      description: "関連する Backlog タスク、Issue、ドキュメントなどのリンクを記載してください"
      placeholder: |
        - https://xxx.backlog.com/view/PROJ-123
        - #456
    validations:
      required: false
