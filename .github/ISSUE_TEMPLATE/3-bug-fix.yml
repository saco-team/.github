name: "Bug Fix"
description: "バグ修正 - 軽量ワークフロー"
title: "[Bug] "
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Fix テンプレート
        バグ修正用です。
        ワークフロー: 要件確認 → 開発 → AIレビュー → セルフレビュー → PR

  # ── バグの概要 ──
  - type: textarea
    id: summary
    attributes:
      label: "バグの概要"
      description: "何が問題か、期待される動作と実際の動作を記述してください"
      placeholder: |
        ### 期待される動作


        ### 実際の動作

    validations:
      required: true

  # ── 再現手順 ──
  - type: textarea
    id: reproduction-steps
    attributes:
      label: "再現手順"
      description: "バグを再現するための手順を記述してください"
      placeholder: |
        1. [画面] にアクセス
        2. [操作] を実行
        3. [結果] が表示される
    validations:
      required: true

  # ── 受入基準 ──
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: "受入基準"
      description: "修正完了の判断基準。開発者はこの条件を回帰テストとして実装してください"
      placeholder: |
        - [ ] 再現手順で期待される動作になること
        - [ ] （追加の確認観点があれば記載）
      render: markdown
    validations:
      required: true

  # ── 影響範囲 ──
  - type: textarea
    id: impact
    attributes:
      label: "影響範囲"
      description: "このバグが影響する画面・機能・ユーザー"
      placeholder: |
        - 影響する画面:
        - 影響するユーザー:
        - 発生頻度: 常に / 時々 / 稀に
    validations:
      required: true

  # ── 原因の仮説（任意） ──
  - type: textarea
    id: root-cause
    attributes:
      label: "原因の仮説（任意）"
      description: "原因の見当がついている場合は記載してください"
      placeholder: |
        - 原因と思われる箇所:
        - 根拠:
    validations:
      required: false

  # ── ワークフローチェックリスト ──
  - type: checkboxes
    id: workflow-checklist
    attributes:
      label: "ワークフローチェックリスト"
      description: "各ステップの完了をチェックしてください"
      options:
        - label: "要件確認（受入基準の合意）"
        - label: "原因調査完了"
        - label: "実装完了"
        - label: "/code-review 実施済み"
        - label: "セルフレビュー完了"
        - label: "PR 作成済み"

  # ── スクリーンショット ──
  - type: textarea
    id: screenshots
    attributes:
      label: "スクリーンショット（任意）"
      description: "バグの状態を示すスクリーンショットがあれば添付してください"
    validations:
      required: false

  # ── 環境 ──
  - type: dropdown
    id: environment
    attributes:
      label: "発生環境"
      default: 2
      options:
        - "Production"
        - "Staging"
        - "Development"
        - "全環境"
    validations:
      required: true

  # ── 受入検証者 ──
  - type: input
    id: acceptance-reviewer
    attributes:
      label: "受入検証者（任意）"
      description: "受入検証する人の GitHub ユーザー名を @付きで記載すると、Issue クローズ時に通知が届きます"
      placeholder: "@username"
    validations:
      required: false

  # ── 関連情報 ──
  - type: input
    id: backlog-link
    attributes:
      label: "関連 Backlog タスク（任意）"
      placeholder: "https://xxx.backlog.com/view/PROJ-123"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "優先度"
      options:
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true
