name: "Task"
description: "作業依頼・技術的負債・リファクタリング・環境改善など"
labels: []
projects: ["saco-team/1"]
body:
  - type: markdown
    attributes:
      value: |
        ## Task テンプレート
        Feature・Bug 以外の作業に使用します（技術的負債、リファクタリング、作業依頼、環境改善など）。
        ワークフロー: 要件確認 → 開発 → AIレビュー → セルフレビュー → PR

  # ── 概要 ──
  - type: textarea
    id: summary
    attributes:
      label: "概要"
      description: "何をするのか、なぜ必要なのかを記述してください"
      placeholder: |
        ### やること


        ### 背景・目的

    validations:
      required: true

  # ── カテゴリ ──
  - type: dropdown
    id: category
    attributes:
      label: "カテゴリ"
      options:
        - "作業依頼"
        - "リファクタリング"
        - "パフォーマンス改善"
        - "CI/CD・開発環境改善"
        - "依存パッケージ更新"
        - "セキュリティ対応"
        - "テスト追加"
        - "ドキュメント整備"
        - "その他"
    validations:
      required: true

  # ── 完了条件 ──
  - type: textarea
    id: done-criteria
    attributes:
      label: "完了条件"
      description: "作業が完了したと判断できる条件"
      placeholder: |
        - [ ] 条件1
        - [ ] 条件2
      render: markdown
    validations:
      required: true

  # ── 作業計画（任意） ──
  - type: textarea
    id: plan
    attributes:
      label: "作業計画（任意）"
      description: "具体的な変更内容、手順、リスクがあれば記載してください"
      placeholder: |
        ### 変更するファイル/コンポーネント
        -

        ### 手順
        1.
        2.

        ### リスク
        -
      render: markdown
    validations:
      required: false

  # ── ワークフローチェックリスト ──
  - type: checkboxes
    id: workflow-checklist
    attributes:
      label: "ワークフローチェックリスト"
      description: "各ステップの完了をチェックしてください"
      options:
        - label: "要件確認（完了条件の合意）"
        - label: "実装完了"
        - label: "/code-review 実施済み"
        - label: "セルフレビュー完了"
        - label: "PR 作成済み"

  # ── 参考資料 ──
  - type: textarea
    id: references
    attributes:
      label: "参考資料（任意）"
      description: "参考になるスクリーンショットや資料があれば添付してください"
    validations:
      required: false

  # ── 受入検証者 ──
  - type: textarea
    id: acceptance-reviewer
    attributes:
      label: "受入検証者（任意）"
      description: "受入検証する人の GitHub ユーザー名を @付きで記載すると、Issue クローズ時に通知が届きます"
      placeholder: "@username"
    validations:
      required: false

  # ── 関連リンク ──
  - type: textarea
    id: related-links
    attributes:
      label: "関連リンク（任意）"
      description: "関連する Backlog タスク、Issue、ドキュメントなどがあればリンクを記載してください"
      placeholder: |
        - https://xxx.backlog.com/view/PROJ-123
        - #456
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: "優先度"
      options:
        - "High"
        - "Medium"
        - "Low"
    validations:
      required: true
